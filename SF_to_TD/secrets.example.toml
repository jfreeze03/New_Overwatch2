# Copy to config/secrets.toml and fill in. DO NOT COMMIT the real file.
# config/secrets.toml is gitignored.

[teradata]
host     = "td-host.alfa.internal"
user     = "JOE_DEE"
password = ""          # leave blank to be prompted, or use LDAP/key mgr
logmech  = "TD2"       # TD2 | LDAP | KRB5  -- ALFA may use LDAP
# Databases (TD "database" == schema) you want in scope:
databases = ["RAW_DB", "ANALYTICS_DB"]

[snowflake]
account   = "alfa-prod"          # <org>-<account> or locator
user      = "JOE_DEE"
password  = ""                   # blank -> prompt; prefer key-pair for svc accts
role      = "MIGRATION_ENGINEER_ROLE"
warehouse = "ENGINEER_WH"        # keep this XS/S for compare jobs to control cost
# private_key_path = "/path/to/rsa_key.p8"   # uncomment for key-pair auth
# private_key_passphrase = ""
# Snowflake database.schema targets, paired positionally to TD databases above:
schemas   = ["RAW_DB.PUBLIC", "ANALYTICS_DB.PUBLIC"]

[options]
# Cheap-by-default. Fingerprints and full-row pulls are opt-in in the UI.
row_count_guard      = 5000000   # tables above this are excluded from full-row pull
fingerprint_guard    = 200000000 # tables above this skip aggregate fingerprint by default
default_sample_pct   = 100       # set <100 to sample fingerprints on huge tables
